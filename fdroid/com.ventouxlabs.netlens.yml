# This recipe covers only the com.ventouxlabs.netlens application ID. The app
# was previously published under com.ventoux.netlens (and, before that,
# us.beary.netlens) — those are different Android application IDs and a
# different app as far as F-Droid/Play/existing installs are concerned, so
# their version history does not carry over here. First build entry below
# (1.1.3) is the first tag built under the current application ID.
AntiFeatures:
  NonFreeNet:
    en-US: >
      Connects to third-party network services for optional, user-initiated
      lookups: ipinfo.io (IP Info screen and, if enabled, the home screen
      widget's public-IP display), ipwho.is (Traceroute hop geolocation),
      api.abuseipdb.com (IP reputation lookup, requires the user's own API
      key), and speed.cloudflare.com (Speed Test tool). All traffic is HTTPS;
      none of these run automatically without the user opening the relevant
      screen or enabling the relevant widget setting.

Builds:
  - versionName: 1.1.3
    versionCode: 6
    commit: v1.1.3
    subdir: app
    gradle:
      - foss
  - versionName: 1.2.0
    versionCode: 7
    commit: v1.2.0
    subdir: app
    gradle:
      - foss

AutoUpdateMode: Version v%v
UpdateCheckMode: Tags ^v[0-9]+\.[0-9]+\.[0-9]+$
