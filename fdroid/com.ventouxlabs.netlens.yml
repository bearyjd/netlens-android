AntiFeatures:
  NonFreeNet:
    en-US: "Connects to third-party network services for optional, user-initiated\
      \ lookups: ipinfo.io (IP Info screen and, if enabled, the home screen widget's\
      \ public-IP display), ipwho.is (Traceroute hop geolocation), api.abuseipdb.com\
      \ (IP reputation lookup, requires the user's own API key), and speed.cloudflare.com\
      \ (Speed Test tool). All traffic is HTTPS; none of these run automatically without\
      \ the user opening the relevant screen or enabling the relevant widget setting.\n"
