// Compose compiler stability configuration.
//
// Classes in NetLens feature/core `model` packages are immutable UI-state and domain
// value types — data classes updated via copy(), never mutated in place. Marking them
// stable lets the Compose compiler generate skippable composables that receive them, so
// an unchanged instance no longer forces recomposition. Scoped to first-party code only.
//
// INVARIANT: every class in a matched `model` package MUST stay immutable (val-only,
// read-only collections). A `var` or mutable collection in a matched class silently
// breaks recomposition (stale UI, no compile error) because Compose will skip
// composables whose inputs it wrongly believes cannot change.
com.ventouxlabs.netlens.**.model.**
