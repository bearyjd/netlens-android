name: Generate Baseline Profile

# Manually dispatched: runs the :baselineprofile Macrobenchmark journey on an
# API 34 emulator (GitHub-hosted runners have KVM), then commits the generated
# app/src/fossRelease/generated/baselineProfiles/baseline-prof.txt back to the branch
# the workflow was dispatched from.
#
# Exists because neither local option works: both test phones run Android 17
# (API 37), where ART returns an empty profile, and the dev machine's kernel
# segfaults the Android emulator's bundled QEMU.

on:
  workflow_dispatch:
  # workflow_dispatch only registers once the file reaches the default branch, so
  # also trigger on pushes to the feature branch itself. paths-ignore stops the
  # bot's own profile commit from retriggering generation.
  push:
    branches: [perf/baseline-profile]
    paths-ignore:
      - "app/src/fossRelease/generated/baselineProfiles/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Generate baseline profile on API 34 emulator
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-window -no-audio -no-boot-anim -no-snapshot -gpu swiftshader_indirect -camera-back none -camera-front none
          script: ./gradlew :app:generateFossReleaseBaselineProfile

      - name: Upload generated profile
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: baseline-profile
          path: app/src/fossRelease/generated/baselineProfiles/
          retention-days: 30
          if-no-files-found: error

      - name: Commit profile to branch
        run: |
          if [ ! -s app/src/fossRelease/generated/baselineProfiles/baseline-prof.txt ]; then
            echo "::error::baseline-prof.txt missing or empty — not committing"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/fossRelease/generated/baselineProfiles/
          if git diff --cached --quiet; then
            echo "Profile unchanged — nothing to commit"
            exit 0
          fi
          git commit -m "perf: add generated baseline profile (API 34 emulator, CI)"
          git push origin HEAD:${{ github.ref_name }}
