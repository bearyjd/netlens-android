name: Generate Baseline Profile

# Manually dispatched (from a BRANCH, never master): runs the :baselineprofile
# Macrobenchmark journey on an API 34 emulator (GitHub-hosted runners have KVM),
# then commits the regenerated app/src/main/generated/baselineProfiles/ back to
# the dispatching branch. Profile changes reach master via PR only — commits
# pushed with GITHUB_TOKEN don't trigger workflows, so a direct-to-master commit
# would land without CI.
#
# Exists because neither local option works: both test phones run Android 17
# (API 37), where ART returns an empty profile, and the dev machine's kernel
# segfaults the Android emulator's bundled QEMU.

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Refuse to run against master
        if: github.ref_name == 'master'
        run: |
          echo "::error::Dispatch this from a branch, not master — profile commits must go through a PR"
          exit 1

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Generate baseline profile on API 34 emulator
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-window -no-audio -no-boot-anim -no-snapshot -gpu swiftshader_indirect -camera-back none -camera-front none
          # mergeIntoMain replaces the per-variant generate tasks with this one.
          script: ./gradlew :app:generateBaselineProfile

      - name: Upload generated profile
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: baseline-profile
          path: app/src/main/generated/baselineProfiles/
          retention-days: 30
          if-no-files-found: error

      - name: Commit profile to branch
        run: |
          if [ ! -s app/src/main/generated/baselineProfiles/baseline-prof.txt ]; then
            echo "::error::baseline-prof.txt missing or empty — not committing"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/generated/baselineProfiles/
          if git diff --cached --quiet; then
            echo "Profile unchanged — nothing to commit"
            exit 0
          fi
          git commit -m "perf: regenerate baseline profile (API 34 emulator, CI)"
          # Generation takes ~20 min; the branch may have moved. Rebase, don't clobber.
          git pull --rebase origin ${{ github.ref_name }} || { echo "::error::rebase failed — resolve manually and re-dispatch"; exit 1; }
          git push origin HEAD:${{ github.ref_name }}
