name: Play Publish

# Manual upload of the signed gplay AAB + store listing to Google Play via
# fastlane supply. Requires the com.ventouxlabs.netlens app to already exist in
# the Play Console with one prior manual upload (see docs/play-store.md), plus a
# PLAY_SERVICE_ACCOUNT_JSON repository secret.
on:
  workflow_dispatch:
    inputs:
      track:
        description: "Play track"
        default: "internal"
        type: choice
        options: [internal, alpha, beta, production]
      release_status:
        description: "Release status"
        default: "draft"
        type: choice
        options: [draft, completed]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v4

      # TODO: pin ruby/setup-ruby to a commit SHA to match this repo's convention.
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Guard against shadowing local.properties
        run: |
          if [ -f local.properties ]; then
            echo "::error::local.properties is present in CI checkout and would shadow env-based signing"
            exit 1
          fi

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          : "${RELEASE_KEYSTORE_BASE64:?RELEASE_KEYSTORE_BASE64 secret is not set}"
          mkdir -p "$RUNNER_TEMP/keystore"
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/keystore/release.keystore"
          echo "RELEASE_STORE_FILE=$RUNNER_TEMP/keystore/release.keystore" >> "$GITHUB_ENV"

      - name: Build signed gplay AAB
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew bundleGplayRelease

      - name: Write Play service-account key
        env:
          PLAY_SERVICE_ACCOUNT_JSON_DATA: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          : "${PLAY_SERVICE_ACCOUNT_JSON_DATA:?PLAY_SERVICE_ACCOUNT_JSON secret is not set}"
          printf '%s' "$PLAY_SERVICE_ACCOUNT_JSON_DATA" > "$RUNNER_TEMP/play.json"
          echo "PLAY_SERVICE_ACCOUNT_JSON=$RUNNER_TEMP/play.json" >> "$GITHUB_ENV"

      - name: Upload to Play (${{ inputs.track }} / ${{ inputs.release_status }})
        run: bundle exec fastlane deploy track:"${{ inputs.track }}" release_status:"${{ inputs.release_status }}"
