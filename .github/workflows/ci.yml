name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Build debug APK
        run: ./gradlew assembleFossDebug

      - name: Run unit tests
        # :app is the only flavored module (testFossDebugUnitTest); the library
        # modules expose testDebugUnitTest. Both are needed for full coverage —
        # the two task names don't overlap, so nothing runs twice.
        run: ./gradlew testFossDebugUnitTest testDebugUnitTest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-results
          path: "**/build/test-results/**/TEST-*.xml"
          retention-days: 14
