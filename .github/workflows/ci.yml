name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Build debug APK
        run: ./gradlew assembleFossDebug

      - name: Run unit tests
        # :app is the only flavored module (testFossDebugUnitTest); the library
        # modules expose testDebugUnitTest. Both are needed for full coverage —
        # the two task names don't overlap, so nothing runs twice.
        run: ./gradlew testFossDebugUnitTest testDebugUnitTest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-results
          path: "**/build/test-results/**/TEST-*.xml"
          retention-days: 14
