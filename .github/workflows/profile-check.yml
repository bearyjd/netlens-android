name: Profile Check

# The main CI only builds assembleFossDebug, so the release-side ART-profile
# merge (which consumes app/src/main/generated/baselineProfiles/) is never
# exercised on PRs — a corrupt or hand-mangled profile would merge green and
# first fail at release time. This runs the release assembly, path-filtered to
# the few files that can break it.

on:
  pull_request:
    branches: [master]
    paths:
      - "app/src/main/generated/baselineProfiles/**"
      - "app/build.gradle.kts"
      - "baselineprofile/**"
      - "gradle/libs.versions.toml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-profile-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Assemble release (unsigned) — exercises the profile merge
        run: ./gradlew :app:assembleFossRelease

      - name: Verify profile embedded in APK
        run: |
          APK=$(ls app/build/outputs/apk/foss/release/*.apk | head -1)
          unzip -l "$APK" | grep -q "assets/dexopt/baseline.prof" || {
            echo "::error::baseline.prof missing from release APK — profile merge silently produced nothing"
            exit 1
          }
          echo "baseline.prof present in $APK"
