name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v4

      - name: Verify tag matches gradle version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          GRADLE_VERSION=$(grep '^netlens.versionName=' gradle.properties | cut -d= -f2)
          if [ "$TAG_VERSION" != "$GRADLE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match gradle.properties ($GRADLE_VERSION)"
            exit 1
          fi

      - name: Guard against shadowing local.properties
        run: |
          if [ -f local.properties ]; then
            echo "::error::local.properties is present in CI checkout and would shadow env-based signing"
            exit 1
          fi

      - name: Decode and validate release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          : "${RELEASE_KEYSTORE_BASE64:?RELEASE_KEYSTORE_BASE64 secret is not set}"
          : "${RELEASE_STORE_PASSWORD:?RELEASE_STORE_PASSWORD secret is not set}"
          : "${RELEASE_KEY_ALIAS:?RELEASE_KEY_ALIAS secret is not set}"
          : "${RELEASE_KEY_PASSWORD:?RELEASE_KEY_PASSWORD secret is not set}"
          mkdir -p "$RUNNER_TEMP/keystore"
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/keystore/release.keystore"
          keytool -list -keystore "$RUNNER_TEMP/keystore/release.keystore" \
                  -storepass "$RELEASE_STORE_PASSWORD" \
                  -alias "$RELEASE_KEY_ALIAS" >/dev/null
          keytool -list -v -keystore "$RUNNER_TEMP/keystore/release.keystore" \
                  -storepass "$RELEASE_STORE_PASSWORD" \
                  -alias "$RELEASE_KEY_ALIAS" \
            | grep -E 'Owner|Issuer|SHA256|Valid until' || true
          echo "RELEASE_STORE_FILE=$RUNNER_TEMP/keystore/release.keystore" >> "$GITHUB_ENV"

      - name: Build release APK and AAB
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease bundleRelease

      - name: Upload artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: netlens-${{ github.ref_name }}
          path: |
            app/build/outputs/apk/*/release/*.apk
            app/build/outputs/bundle/*Release/*.aab
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          generate_release_notes: true
          files: |
            app/build/outputs/apk/*/release/*.apk
            app/build/outputs/bundle/*Release/*.aab
